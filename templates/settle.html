{% extends "base.html" %}
{% block title %}Settle Up — UdharFree{% endblock %}

{% block content %}
<div class="container container-sm">
  <a href="{{ url_for('dashboard') }}" class="back-link">&larr; Back</a>
  <h2 class="page-title">Settle Up</h2>

  <div class="card">
    <div class="card-body">
      {% if owe_list %}
      <form method="POST" action="{{ url_for('settle_post') }}">
        <div class="form-group">
          <label for="to_user">Settle with</label>
          <select id="to_user" name="to_user" required>
            <option value="">Select person...</option>
            {% for o in owe_list %}
            <option value="{{ o.username }}"
              data-amount="{{ o.amount }}"
              {% if o.username == prefill_user %}selected{% endif %}>
              {{ o.display_name }} — you owe ₹{{ "%.2f"|format(o.amount) }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" name="amount" required min="0.01" step="0.01"
                 value="{{ prefill_amount }}" placeholder="0.00" />
        </div>

        <button type="submit" class="btn btn-primary btn-full">Record Settlement</button>
      </form>

      <script>
        const toUserSelect = document.getElementById('to_user');
        const amountInput = document.getElementById('amount');

        function updateAmount() {
          const selected = toUserSelect.options[toUserSelect.selectedIndex];
          const amt = selected.dataset.amount;
          if (amt) amountInput.value = parseFloat(amt).toFixed(2);
          else amountInput.value = '';
        }

        toUserSelect.addEventListener('change', updateAmount);
        // Trigger on load if prefill_user is set
        if (toUserSelect.value) updateAmount();
      </script>

      {% else %}
        <p class="empty-state">You don't owe anyone right now. You're all settled up!</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
