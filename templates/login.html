{% extends "base.html" %}
{% block title %}Login — UdharFree{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">UdharFree</h1>
      <p class="auth-subtitle">Split expenses, stay friends</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Existing User</button>
      <button class="tab-btn" data-tab="register">New User</button>
    </div>

    <!-- Login Form -->
    <div class="tab-content active" id="tab-login">
      <form method="POST" action="{{ url_for('login_post') }}" class="auth-form">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username" required autocomplete="username" placeholder="your_username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
    </div>

    <!-- Register Form -->
    <div class="tab-content" id="tab-register">
      <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" name="username" required placeholder="e.g. alice123" />
        </div>
        <div class="form-group">
          <label for="reg-display-name">Display Name</label>
          <input type="text" id="reg-display-name" name="display_name" required placeholder="e.g. Alice" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" required placeholder="Min. 4 characters" />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" name="confirm_password" required placeholder="Repeat password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>
    </div>
  </div>
</div>

<script>
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabContents = document.querySelectorAll('.tab-content');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      tabContents.forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
</script>
{% endblock %}
